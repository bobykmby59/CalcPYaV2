name: Compilar APK Rider Calc Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Compilar Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configurar Java JDK (Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias del Proyecto
        run: npm install

      - name: Empaquetar automáticamente para la carpeta www
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp icon-*.png www/ 2>/dev/null || true

      - name: Inicializar y Sincronizar Plataforma Android
        run: |
          npx cap sync
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Configurar AndroidManifest.xml con permisos de GPS y bateria
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('$MANIFEST_PATH', 'utf8');
              
              // Declaración de permisos nativos para GPS de alta precisión en segundo plano y exclusión de batería
              const permissions = '\n' +
                '    <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n' +
                '    <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n' +
                '    <uses-permission android:name=\"android.permission.ACCESS_BACKGROUND_LOCATION\" />\n' +
                '    <uses-permission android:name=\"android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS\" />\n';
              
              content = content.replace('</manifest>', permissions + '</manifest>');
              
              // Habilitar tráfico Cleartext para conexiones seguras WebView
              if (!content.includes('android:usesCleartextTraffic')) {
                content = content.replace('<application', '<application android:usesCleartextTraffic=\"true\"');
              }
              
              fs.writeFileSync('$MANIFEST_PATH', content, 'utf8');
            ";
            echo "AndroidManifest.xml configurado correctamente con permisos de GPS de alta precisión."
          else
            echo "Error: No se encontró el archivo AndroidManifest.xml nativo."
            exit 1
          fi

      - name: Compilar APK con Gradle (Android)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Generada como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Rider-Calc-Pro-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
