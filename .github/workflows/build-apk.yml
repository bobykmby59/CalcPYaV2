name: Compilar APK Rider Calc Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Compilar Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configurar Java JDK (Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias del Proyecto
        run: npm install

      - name: Empaquetar automáticamente para la carpeta www
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp icon-*.png www/ 2>/dev/null || true

      - name: Inicializar y Sincronizar Plataforma Android
        run: |
          npx cap sync
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Configurar AndroidManifest.xml con permisos de GPS y bateria
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('$MANIFEST_PATH', 'utf8');
              
              // Declaración de permisos nativos optimizados para evitar bloqueos del sistema Android
              const permissions = '\n' +
                '    <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n' +
                '    <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n' +
                '    <uses-permission android:name=\"android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS\" />\n';
              
              content = content.replace('</manifest>', permissions + '</manifest>');
              
              // Habilitar tráfico Cleartext para conexiones seguras WebView
              if (!content.includes('android:usesCleartextTraffic')) {
                content = content.replace('<application', '<application android:usesCleartextTraffic=\"true\"');
              }
              
              fs.writeFileSync('$MANIFEST_PATH', content, 'utf8');
            ";
            echo "AndroidManifest.xml configurado correctamente con permisos de GPS de alta precisión."
          else
            echo "Error: No se encontró el archivo AndroidManifest.xml nativo."
            exit 1
          fi

      - name: Instalar ImageMagick (Procesador de imagenes)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generar iconos de aplicacion personalizados (Casco de Neon)
        run: |
          SRC_ICON="icon-512.png"
          if [ -f "$SRC_ICON" ]; then
            echo "Generando iconos nativos de Android..."
            
            # Eliminar la carpeta de iconos adaptativos XML para forzar el fallback a los PNGs generados
            rm -rf android/app/src/main/res/mipmap-anydpi-v26
            
            # Generar los iconos en todos los formatos de densidad (redondos y cuadrados)
            convert "$SRC_ICON" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$SRC_ICON" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            
            convert "$SRC_ICON" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$SRC_ICON" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            
            convert "$SRC_ICON" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$SRC_ICON" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            
            convert "$SRC_ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$SRC_ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            
            convert "$SRC_ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            convert "$SRC_ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            
            echo "Iconos nativos del casco de neón inyectados con éxito."
          else
            echo "Advertencia: No se encontró el archivo base icon-512.png en la raíz."
          fi

      - name: Compilar APK con Gradle (Android)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Generada como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Rider-Calc-Pro-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
