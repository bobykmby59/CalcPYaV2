name: Compilar APK Rider Calc Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Compilar Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configurar Java JDK (Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias del Proyecto
        run: npm install

      - name: Crear Estructura de Directorios si no existe
        run: |
          mkdir -p www
          # Asegura que Capacitor reconozca la carpeta web de origen antes de sincronizar

      - name: Inicializar y Sincronizar Plataforma Android
        run: |
          npx cap sync
          # Si no tienes la carpeta 'android' en el repositorio, la agrega de forma automática:
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Compilar APK con Gradle (Android)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Generada como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Rider-Calc-Pro-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
