name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Create Temporary Web Directory
        run: |
          mkdir -p www
          cp index.html style.css app.js manifest.json sw.js www/ || true

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Inject GPS, Background & WakeLock Permissions
        run: |
          node -e "
          const fs = require('fs');
          const path = 'android/app/src/main/AndroidManifest.xml';
          if (!fs.existsSync(path)) {
            console.error('¡AndroidManifest.xml no encontrado!');
            process.exit(1);
          }
          let xml = fs.readFileSync(path, 'utf8');
          const permissions = \`
              <!-- Permisos avanzados para GPS de Alta Precisión y Segundo Plano sin interrupciones -->
              <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />
              <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
              <uses-permission android:name=\"android.permission.ACCESS_BACKGROUND_LOCATION\" />
              <uses-permission android:name=\"android.permission.WAKE_LOCK\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_LOCATION\" />
              <uses-feature android:name=\"android.hardware.location.gps\" />
          \`;
          
          if (xml.includes('<application')) {
            xml = xml.replace('<application', permissions + '\\n    <application');
            fs.writeFileSync(path, xml, 'utf8');
            console.log('Permisos avanzados de localización inyectados con éxito.');
          } else {
            console.error('No se pudo encontrar el nodo <application para inyectar.');
            process.exit(1);
          }
          "

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Native Android APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: RiderCalcPro-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
